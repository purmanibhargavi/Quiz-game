<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quiz Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <div id="start-screen" class="screen">
            <h1>Welcome to the Ultimate Quiz!</h1>
            <p>Test your knowledge across different question types.</p>
            <button id="start-btn" class="btn">Start Quiz</button>
        </div>

        <div id="quiz-screen" class="screen hidden">
            <div class="quiz-header">
                <span id="progress">Question 1 of 5</span>
                <span id="score-counter">Score: 0</span>
            </div>
            
            <div id="question-container">
                <h2 id="question-text">Question Text Goes Here?</h2>
                <div id="options-container" class="options-grid"></div>
                <div id="text-input-container" class="hidden">
                    <input type="text" id="blank-input" placeholder="Type your answer here...">
                </div>
            </div>

            <div class="quiz-footer">
                <button id="submit-btn" class="btn">Submit Answer</button>
                <button id="next-btn" class="btn hidden">Next Question</button>
            </div>
        </div>

        <div id="end-screen" class="screen hidden">
            <h2>Quiz Completed!</h2>
            <p id="final-score-text">You scored 0 out of 0</p>
            <button id="restart-btn" class="btn">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
